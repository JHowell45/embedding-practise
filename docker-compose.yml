services:
  nginx:
    image: nginx:1.29.5
    volumes:
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - embedding-net
  api:
    build:
      context: ./embedding-api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        restart: true
    volumes:
      - ./embedding-api/migrations:/app/migrations
    networks:
      - embedding-net
  db:
    image: pgvector/pgvector:pg18-trixie
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER?Variable not set}
      POSTGRES_PASSWORD: ${DB_PASS?Variable not set}
      POSTGRES_DB: ${DB_PATH?Variable not set}
      PGDATA: /var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s
    volumes:
      - ./.docker/db:/docker-entrypoint-initdb.d
      - db-data:/var/lib/postgresql/18/docker

volumes:
  db-data:
networks:
  embedding-net:
