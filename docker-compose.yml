services:
  nginx:
    image: nginx:1.29.5
    depends_on:
      api:
        condition: service_healthy
        restart: true
    volumes:
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - embedding-net
  api:
    build:
      context: ./embedding-api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail 'http://127.0.0.1:3000/api/healthcheck' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./embedding-api/migrations:/app/migrations
    ports:
      - 9000:3000
    networks:
      - embedding-net
  db:
    image: pgvector/pgvector:pg18-trixie
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER?Variable not set}
      POSTGRES_PASSWORD: ${DB_PASS?Variable not set}
      POSTGRES_DB: ${DB_PATH?Variable not set}
      PGDATA: /var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_PATH}"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s
    volumes:
      - ./.docker/db:/docker-entrypoint-initdb.d
      - db-data:/var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    networks:
      - embedding-net
volumes:
  db-data:
networks:
  embedding-net:
